# yaml-language-server: $schema=../../../../schemas/kubevirt.io/kubevirt_v1.json
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  configuration:
    network:
      defaultNetworkInterface: bridge
      permitBridgeInterfaceOnPodNetwork: true
    developerConfiguration:
      featureGates:
      - ExpandDisks
      - Snapshot
      - Template
