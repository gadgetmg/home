apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-server
  labels:
    app.kubernetes.io/name: actual-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: actual-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: actual-server
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: actual-server
            topologyKey: kubernetes.io/hostname
      containers:
      - image: ghcr.io/actualbudget/actual-server
        name: actual-server
        ports:
        - containerPort: 5006
          protocol: TCP
        envFrom:
        - configMapRef:
            name: actual-server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
