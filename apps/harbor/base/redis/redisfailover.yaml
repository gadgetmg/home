# yaml-language-server: $schema=../../../..//schemas/databases.spotahome.com/redisfailover_v1.json
apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: harbor
  labels:
    app.kubernetes.io/name: redis
    redis-failover.freshworks.com/operator-group: redis-operator
spec:
  redis:
    replicas: 3
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: redis
              app.kubernetes.io/instance: harbor
              app.kubernetes.io/name: harbor
              app.kubernetes.io/part-of: redis-failover
          topologyKey: kubernetes.io/hostname
    image: ghcr.io/valkey-io/valkey
    exporter:
      enabled: true
      image: docker.io/oliver006/redis_exporter
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    storage:
      persistentVolumeClaim:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          labels:
            app.kubernetes.io/name: redis
          name: data
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
          storageClassName: ssd-r1
  sentinel:
    replicas: 3
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: sentinel
              app.kubernetes.io/instance: harbor
              app.kubernetes.io/name: harbor
              app.kubernetes.io/part-of: redis-failover
          topologyKey: kubernetes.io/hostname
    image: ghcr.io/valkey-io/valkey
    exporter:
      enabled: true
      image: docker.io/oliver006/redis_exporter
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/policy_v1.json
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: harbor-redis-sentinel
spec:
  rules:
  - name: set-sentinel-rolling-strategy
    match:
      resources:
        kinds:
        - Deployment
        selector:
          matchLabels:
            app.kubernetes.io/component: sentinel
    mutate:
      patchStrategicMerge:
        spec:
          strategy:
            rollingUpdate:
              maxUnavailable: 50%
