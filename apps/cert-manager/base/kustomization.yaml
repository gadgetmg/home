# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- https://github.com/cert-manager/cert-manager/releases/download/v1.20.2/cert-manager.crds.yaml
- https://github.com/kubernetes-sigs/gateway-api/config/crd/experimental?ref=v1.5.1

components:
- ../../../shared/components/strip-helm-labels

helmCharts:
- name: cert-manager
  repo: https://charts.jetstack.io
  releaseName: cert-manager
  namespace: cert-manager
  version: v1.20.2
  valuesInline:
    replicaCount: 1
    podDisruptionBudget:
      enabled: true
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
    dns01RecursiveNameservers: 1.1.1.1:53,1.0.0.1:53
    prometheus:
      servicemonitor:
        enabled: true
    webhook:
      replicaCount: 1
      podDisruptionBudget:
        enabled: true
    cainjector:
      replicaCount: 1
      podDisruptionBudget:
        enabled: true

images:
- name: quay.io/jetstack/cert-manager-cainjector
  newTag: v1.19.2@sha256:1a24f9848e7ae83a787187f4e75fdf5e9adf401f44de2f156c09c6fae1bf046e
- name: quay.io/jetstack/cert-manager-controller
  newTag: v1.20.2@sha256:fe0623d7d04a382c888f03343a3a2da716e0d96ad3d5d790c0ebcbcb2a4329a5
- name: quay.io/jetstack/cert-manager-webhook
  newTag: v1.20.2@sha256:baf651128b9f05c426cbd5e60e2036bf382c99ca270f49d0757d6f7d2452f4e5
