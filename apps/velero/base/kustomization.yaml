# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml

images:
- name: docker.io/velero/velero-plugin-for-aws
  newTag: v1.14.2@sha256:0751144c1c8e52d52c48717fbd13ad5a3061e612ae4d7ad744a946cd5b139d1a

components:
- ../../../shared/components/strip-helm-labels
- ../../../shared/components/k8s-digester

helmCharts:
- name: velero
  repo: https://vmware-tanzu.github.io/helm-charts
  releaseName: velero
  namespace: velero
  version: 12.1.0
  includeCRDs: true
  apiVersions:
  - monitoring.coreos.com/v1
  valuesInline:
    image:
      repository: docker.io/velero/velero
    initContainers:
    - name: velero-plugin-for-aws
      image: docker.io/velero/velero-plugin-for-aws
      volumeMounts:
      - mountPath: /target
        name: plugins
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
    containerSecurityContext:
      runAsUser: 1002
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    upgradeCRDs: false
    configuration:
      backupStorageLocation: []
      volumeSnapshotLocation: []
      features: EnableCSI
      defaultSnapshotMoveData: true
    credentials:
      existingSecret: velero
    deployNodeAgent: true
