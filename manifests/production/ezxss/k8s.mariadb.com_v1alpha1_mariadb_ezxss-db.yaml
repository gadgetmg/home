apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ezxss
  name: ezxss-db
  namespace: ezxss
spec:
  database: ezxss
  galera:
    agent:
      image: ghcr.io/mariadb-operator/mariadb-operator:26.3.0@sha256:5ef5a5d35173b9be603970e7a1625100a0538004ddca984508df2c08c4fd5c72
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
    config:
      volumeClaimTemplate:
