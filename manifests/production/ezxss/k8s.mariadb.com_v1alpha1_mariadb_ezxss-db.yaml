        - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
        storageClassName: ssd-r1
    enabled: true
    initContainer:
      image: ghcr.io/mariadb-operator/mariadb-operator:26.3.0@sha256:5ef5a5d35173b9be603970e7a1625100a0538004ddca984508df2c08c4fd5c72
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
  image: ghcr.io/mariadb/mariadb:12.2.2-noble@sha256:da2a85c2fcaad574e5bca4de9e896682c52fac631748bf15cf64961fd389d786
