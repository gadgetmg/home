apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
    helm.sh/hook-weight: "100"
    kapp.k14s.io/noop: ""
  labels:
    app.kubernetes.io/component: hooks
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/name: kyverno-hooks
    app.kubernetes.io/part-of: kyverno
  name: kyverno-rm-webhooks
  namespace: kyverno
spec:
  backoffLimit: 2
  template:
    metadata:
      labels: {}
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - delete-webhooks
        image: ghcr.io/kyverno/readiness-checker:v1.18.2@sha256:4fb1870b1a4adfed0fa7a32b7c3bcaf736fb889c7e1947ee8b20710bc2f5a5ce
        imagePullPolicy: null
        name: kubectl
        resources:
          limits:
            cpu: 100m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Never
      serviceAccountName: kyverno-admission-controller
