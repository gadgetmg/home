apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/name: paperless-ngx-db
    app.kubernetes.io/part-of: paperless-ngx
  name: paperless-ngx-db
  namespace: paperless-ngx
spec:
  affinity:
    podAntiAffinityType: required
  bootstrap:
    recovery:
      database: paperless-ngx
      source: origin
  externalClusters:
  - name: origin
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: paperless-ngx-db
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:58c9a9e29a23b814f8f335ce178727d83bc40d96ed7fe8977192d2d8cdcb3927
  instances: 3
  plugins:
  - isWALArchiver: true
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: paperless-ngx-db
  storage:
    size: 100Gi
    storageClass: ssd-r1
