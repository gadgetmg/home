apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/name: paperless-ngx-db
    app.kubernetes.io/part-of: paperless-ngx
  name: paperless-ngx-db
  namespace: paperless-ngx
spec:
  affinity:
    podAntiAffinityType: required
  bootstrap:
    recovery:
      database: paperless-ngx
      source: origin
  externalClusters:
  - name: origin
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: paperless-ngx-db
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:9dd9fda84a67a3f351885885fec02ec6346fd941965d8fd94226531fb329624a
  instances: 3
  plugins:
  - isWALArchiver: true
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: paperless-ngx-db
  storage:
    size: 100Gi
    storageClass: ssd-r1
