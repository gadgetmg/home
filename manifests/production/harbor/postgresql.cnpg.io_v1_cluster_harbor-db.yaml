apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: harbor
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: harbor
  name: harbor-db
  namespace: harbor
spec:
  affinity:
    podAntiAffinityType: required
  bootstrap:
    initdb:
      database: registry
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-minimal-trixie@sha256:356e44f0ba49c908fa93a70f080b88b1ede22cb39cf23558cc6579caad3f6ea7
  instances: 3
  storage:
    size: 10Gi
    storageClass: ssd-r1
