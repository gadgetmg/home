apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    ingress.cilium.io/tls-passthrough: enabled
  name: cdi-uploadproxy
  namespace: cdi
spec:
  ingressClassName: cilium
  rules:
  - host: cdi-uploadproxy.seigra.net
    http:
      paths:
      - backend:
          service:
            name: cdi-uploadproxy
            port:
              number: 443
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - cdi-uploadproxy.seigra.net
