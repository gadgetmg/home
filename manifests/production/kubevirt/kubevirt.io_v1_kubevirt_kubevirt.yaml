apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  certificateRotateStrategy: {}
  configuration:
    developerConfiguration:
      featureGates:
      - ExpandDisks
      - Snapshot
      - Template
      - VMExport
      - DataVolumes
    imagePullPolicy: IfNotPresent
    network:
      defaultNetworkInterface: bridge
      permitBridgeInterfaceOnPodNetwork: true
  customizeComponents: {}
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy: {}
