apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  certificateRotateStrategy: {}
  configuration:
    developerConfiguration:
      featureGates:
      - ExpandDisks
      - Snapshot
      - Template
      - VMExport
      - DataVolumes
    imagePullPolicy: IfNotPresent
    seccompConfiguration:
      virtualMachineInstanceProfile:
        customProfile:
          runtimeDefaultProfile: true
  customizeComponents: {}
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy: {}
