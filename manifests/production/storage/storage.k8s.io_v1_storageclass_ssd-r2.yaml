allowVolumeExpansion: true
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
    storageclass.kubernetes.io/is-default-class: "true"
  name: ssd-r2
parameters:
  linstor.csi.linbit.com/autoPlace: "2"
  linstor.csi.linbit.com/encryption: "true"
  linstor.csi.linbit.com/layerList: drbd luks storage
  linstor.csi.linbit.com/resourceGroup: ssd-r2
  linstor.csi.linbit.com/storagePool: ssd
  property.linstor.csi.linbit.com/Aux/linstor.csi.linbit.com/evacuation-action: None
  property.linstor.csi.linbit.com/DrbdOptions/Disk/read-balancing: round-robin
provisioner: linstor.csi.linbit.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
