apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
  name: production-controlplane-1-pools
spec:
  nodeSelector:
    kubernetes.io/hostname: production-controlplane-1
  storagePools:
  - name: ssd
    source:
      hostDevices:
      - /dev/sda
    zfsThinPool: {}
