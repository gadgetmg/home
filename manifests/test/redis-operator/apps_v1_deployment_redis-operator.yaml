apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: redis-operator
    app.kubernetes.io/name: redis-operator
    app.kubernetes.io/part-of: redis-operator
  name: redis-operator
  namespace: redis-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: redis-operator
      app.kubernetes.io/name: redis-operator
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: redis-operator
        app.kubernetes.io/name: redis-operator
    spec:
      containers:
      - env:
        - name: OPERATOR_GROUP_ID
          value: redis-operator
        image: ghcr.io/freshworks-oss/redis-operator:v3.3.5@sha256:8620992f8a5863ad1bd8b64129319208f11cc6e051e65e500aff67f6b8062cb4
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          initialDelaySeconds: 30
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 9710
          timeoutSeconds: 5
        name: redis-operator
        ports:
        - containerPort: 9710
          name: metrics
          protocol: TCP
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 3
          tcpSocket:
            port: 9710
          timeoutSeconds: 3
        resources:
          limits:
            memory: 50Mi
          requests:
            cpu: 10m
            memory: 50Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: redis-operator
