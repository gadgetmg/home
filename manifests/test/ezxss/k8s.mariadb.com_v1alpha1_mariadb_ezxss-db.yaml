apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ezxss
  name: ezxss-db
  namespace: ezxss
spec:
  affinity:
    antiAffinityEnabled: true
  database: ezxss
  galera:
    agent:
      image: ghcr.io/mariadb-operator/mariadb-operator:26.6.0@sha256:a5e17b48f08ef02cda59a5b0ed68a18ae5e0f820129ac391fa220ea117aebd6c
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
    config:
      volumeClaimTemplate:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
        storageClassName: ssd-r1
    enabled: true
    initContainer:
      image: ghcr.io/mariadb-operator/mariadb-operator:26.6.0@sha256:a5e17b48f08ef02cda59a5b0ed68a18ae5e0f820129ac391fa220ea117aebd6c
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
  image: ghcr.io/mariadb/mariadb:12.3.2-noble@sha256:ddfcc5cff7d788dc7c35a2093a3ac3d3950ebe05dcfd7960213b10213842b8b4
  metrics:
    enabled: true
    exporter:
      image: docker.io/prom/mysqld-exporter:v0.19.0@sha256:eacb4b18e2ec1e0abdf2d64851b68526c964f6d9cb3e9458fb5d5f5062ea94c1
      podSecurityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
  podSecurityContext:
    fsGroup: 999
    runAsGroup: 999
    runAsNonRoot: true
    runAsUser: 999
    seccompProfile:
      type: RuntimeDefault
  replicas: 3
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  storage:
    size: 10Gi
    storageClassName: ssd-r1
  username: ezxss
