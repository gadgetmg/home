apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
    kapp.k14s.io/noop: ""
  labels:
    app.kubernetes.io/component: test
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/part-of: kyverno
  name: kyverno-cleanup-controller-readiness
  namespace: kyverno
spec:
  automountServiceAccountToken: true
  containers:
  - args:
    - check-http
    - --service-name=kyverno-cleanup-controller
    - --namespace=kyverno
    - --port=443
    - --path=health/readiness
    - --https
    image: ghcr.io/kyverno/readiness-checker:latest@sha256:cf8fb2cec2b048c6d8ef0566bf3d0eb54ff908ba86f11176fc001ed1af7656bb
    imagePullPolicy: IfNotPresent
    name: test
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
  restartPolicy: Never
