apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
    kapp.k14s.io/noop: ""
  labels:
    app.kubernetes.io/component: test
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/part-of: kyverno
  name: kyverno-reports-controller-metrics
  namespace: kyverno
spec:
  automountServiceAccountToken: true
  containers:
  - args:
    - check-http
    - --service-name=kyverno-reports-controller-metrics
    - --namespace=kyverno
    - --port=8000
    - --path=metrics
    image: ghcr.io/kyverno/readiness-checker:latest@sha256:8a53435fca663edfc5b362224bf52e288d9d2d632457679721d08ef381d81158
    imagePullPolicy: IfNotPresent
    name: test
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
  restartPolicy: Never
