      keys:
      - tpm: {}
        slot: 0
  - name: EPHEMERAL
    encryption:
      provider: luks2
      keys:
      - tpm: {}
        slot: 0
  patches:
  - '@clusterconfig/patches/linstor-ssd-sata-vol1.yaml'
