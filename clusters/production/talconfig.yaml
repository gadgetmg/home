# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/v3.1.12/pkg/config/schemas/talconfig.json
clusterName: production
# renovate: datasource=github-releases depName=siderolabs/talos
talosVersion: v1.13.6
# renovate: datasource=github-releases depName=kubernetes/kubernetes
kubernetesVersion: v1.36.1
endpoint: https://10.1.4.10:6443
nodes:
- hostname: production-controlplane-1
  ipAddress: 10.1.4.11
  installDisk: /dev/nvme0n1
  controlPlane: true
  nodeLabels:
    seigra.net/storage: "true"
  networkInterfaces:
  - interface: br0
    dhcp: true
    vip:
      ip: 10.1.4.10
    bridge:
      interfaces:
      - enp2s0
  volumes:
  - name: STATE
    encryption:
      provider: luks2
      keys:
      - tpm: {}
        slot: 0
  - name: EPHEMERAL
    encryption:
      provider: luks2
      keys:
      - tpm: {}
        slot: 0
- hostname: production-controlplane-2
  ipAddress: 10.1.4.12
  installDisk: /dev/nvme0n1
  controlPlane: true
  nodeLabels:
    seigra.net/storage: "true"
