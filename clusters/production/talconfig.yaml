  - interface: br0
    dhcp: true
    vip:
      ip: 10.1.4.10
    bridge:
      interfaces:
      - enp2s0
  volumes:
  - name: STATE
    encryption:
      provider: luks2
      keys:
      - tpm: {}
        slot: 0
  - name: EPHEMERAL
    encryption:
      provider: luks2
      keys:
      - tpm: {}
        slot: 0
- hostname: production-controlplane-3
  ipAddress: 10.1.4.13
  installDisk: /dev/nvme0n1
