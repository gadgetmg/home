apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloudflare-gateway

resources:
- https://github.com/pl4nty/cloudflare-kubernetes-gateway/config/default?ref=v0.4.0
# renovate: datasource=github-releases depName=pl4nty/cloudflare-kubernetes-gateway
- https://raw.githubusercontent.com/pl4nty/cloudflare-kubernetes-gateway/v0.4.0/config/prometheus/monitor.yaml

patches:
- patch: |- # Privilege namespace
    - op: add
      path: /metadata/labels
      value:
        pod-security.kubernetes.io/enforce: baseline
  target:
    kind: Namespace
    name: cloudflare-gateway
